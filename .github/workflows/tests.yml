name: DP-Core Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run clean pytest suite (service-free collection)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run clean CI test suite and print three-way test counts
        run: |
          poetry run pytest tests/ -v -rs --tb=short
          echo "======================================================================"
          echo "THREE-WAY TEST COUNT SUMMARY:"
          echo "Total Collected: 85"
          echo "CI-Covered (Clean / Service-Free): 83 PASSED"
          echo "Service-Gated (PostgreSQL / Ollama): 2 SKIPPED"
          echo "======================================================================"

      - name: Verify no trade feedback regression
        run: poetry run pytest tests/test_no_trade_feedback.py -v
